name: Build and Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}

      - name: Show workspace contents (debug)
        run: |
          echo "CWD: $(pwd)"
          echo "Files:"; ls -al
          for p in index.html css img js article articles.json; do echo "--- $p ---"; ls -al "$p" || true; done

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /home/wartajan/public_html/
